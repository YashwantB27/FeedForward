{% extends 'base.html' %}
{% block title %}Login — FeedForward{% endblock %}
{% block content %}
<div style="max-width:420px;margin:48px auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2.5rem;">🌱</div>
      <h1 style="font-size:1.8rem;font-weight:800;color:var(--green);">{{ t.login_title }}</h1>
      <p style="color:var(--text2);">{{ t.login_sub }}</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>{{ t.login_email }}</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>{{ t.login_password }}</label>
        <input type="password" name="password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;text-align:center;">
        {{ t.login_btn }}
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;color:var(--text2);">
      {{ t.login_no_acct }}
      <a href="{{ url_for('auth.register') }}" style="color:var(--green);font-weight:600;">{{ t.login_register }}</a>
    </p>
  </div>
</div>
{% endblock %}
