{% extends 'base.html' %}
{% block title %}Join FeedForward{% endblock %}
{% block content %}
<div style="max-width:480px;margin:48px auto;">
  <div class="card">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:2.5rem;">🌱</div>
      <h1 style="font-size:1.8rem;font-weight:800;color:var(--green);">{{ t.reg_title }}</h1>
      <p style="color:var(--text2);">{{ t.reg_sub }}</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>{{ t.reg_name }}</label>
        <input type="text" name="name" required placeholder="Your Name"/>
      </div>
      <div class="form-group">
        <label>{{ t.login_email }}</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>{{ t.login_password }}</label>
        <input type="password" name="password" required placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>{{ t.reg_role }}</label>
        <select name="role">
          <option value="user">🏃 Regular User</option>
          <option value="donor">🎁 Food Donor</option>
          <option value="recipient">🙏 Food Recipient</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:8px;text-align:center;">
        {{ t.reg_btn }}
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;color:var(--text2);">
      {{ t.reg_have_acct }}
      <a href="{{ url_for('auth.login') }}" style="color:var(--green);font-weight:600;">{{ t.nav_login }}</a>
    </p>
  </div>
</div>
{% endblock %}
