{% extends 'base.html' %}
{% block title %}{{ t.setup_title }}{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-size:3rem;">⚙️</div>
    <h1 style="font-size:2rem;font-weight:800;color:var(--green);">{{ t.setup_title }}</h1>
    <p style="color:var(--text2);">{{ t.setup_subtitle }}</p>
  </div>
  <div class="card">
    <form method="POST">
      <h3 style="color:var(--green);font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--green-lt);">{{ t.setup_personal }}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group"><label>Age (years)</label><input type="number" name="age" required min="10" max="100" value="22"/></div>
        <div class="form-group"><label>Gender</label>
          <select name="gender"><option value="male">Male</option><option value="female">Female</option></select>
        </div>
        <div class="form-group"><label>Weight (kg)</label><input type="number" name="weight" required step="0.1" value="70"/></div>
        <div class="form-group"><label>Height (cm)</label><input type="number" name="height" required step="0.1" value="170"/></div>
      </div>
      <div class="form-group"><label>Location</label><input type="text" name="location" placeholder="e.g. Hyderabad" value="Hyderabad"/></div>

      <h3 style="color:var(--green);font-weight:700;margin:24px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--green-lt);">{{ t.setup_diet_pref }}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group"><label>Dietary Preference</label>
          <select name="dietary_pref">
            <option value="veg">🥦 Vegetarian</option>
            <option value="non_veg">🍗 Non-Vegetarian</option>
            <option value="vegan">🌱 Vegan</option>
          </select>
        </div>
        <div class="form-group"><label>Health Goal</label>
          <select name="health_goal">
            <option value="lose_weight">⚖️ Lose Weight</option>
            <option value="gain_muscle">💪 Gain Muscle</option>
            <option value="stay_fit">🏃 Stay Fit</option>
          </select>
        </div>
      </div>

      <h3 style="color:var(--green);font-weight:700;margin:24px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--green-lt);">{{ t.setup_fitness }}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
        <div class="form-group"><label>Fitness Level</label>
          <select name="fitness_level">
            <option value="beginner">🌱 Beginner</option>
            <option value="intermediate">🔥 Intermediate</option>
            <option value="advanced">⚡ Advanced</option>
          </select>
        </div>
        <div class="form-group"><label>Equipment</label>
          <select name="equipment">
            <option value="none">🏠 None</option>
            <option value="dumbbells">🏋️ Dumbbells</option>
            <option value="gym">🏟️ Full Gym</option>
          </select>
        </div>
        <div class="form-group"><label>Days/Week</label>
          <select name="days_per_week">
            <option value="3">3 days</option>
            <option value="4" selected>4 days</option>
            <option value="5">5 days</option>
            <option value="6">6 days</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;text-align:center;font-size:1.05rem;padding:14px;margin-top:8px;">
        {{ t.setup_generate }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
